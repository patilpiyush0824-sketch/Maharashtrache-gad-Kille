<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>महाराजांचा जन्म</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    background: lightblue;
}

/* HEADER */
.header {
    width: 100%; /* full page width */
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f4c664;
    padding: 10px 20px;
    box-sizing: border-box;
}

/* Left section: logo + heading */
.left-section {
    display: flex;
    align-items: center;
}

.left-section img {
    width:35px;
    margin-right:15px;
}

.left-section h1 {
    font-size:24px;
    margin:0;
}

/* Right section: buttons */
.right-section {
    display: flex;
    flex-wrap: wrap;
}

.right-section button {
    margin-left:6px;
    margin-top:3px;
    padding:4px 8px;
    border:1px solid #aaa;
    cursor:pointer;
    border-radius:4px;
    font-weight:bold;
}

.black-btn {
    background:black;
    color:white;
}

.lang-btn {
    background:orange;
    color:white;
    border:none;
}

/* MAIN IMAGE */
.main-content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding:20px;
}

.main-image {
    max-width: 90%;
    max-height: 80%;
    border:3px solid black;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
}

/* FOOTER */
footer {
    text-align:center;
    padding:20px;
    background:black;
    color:#f5c26b;
    font-size:18px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="left-section">
        <img src="D:\\WPD PROJECT\\Image sources\\castle.png" alt="Logo">
        <h1>पहिले किल्ला जिंकला ते “तोरणा किल्ला</h1>
    </div>
    <div class="right-section">
        <button class="black-btn">A+</button>
        <button class="black-btn">A-</button>
        <button class="black-btn">A</button>
        <button class="black-btn">A</button>
        <button class="lang-btn">EN</button>
        <button class="lang-btn">मराठी</button>
    </div>
</div>

<!-- MAIN IMAGE -->
<div class="main-content">
    <img src="D:\WPD PROJECT\NEW WPD PROJECT\raje4.webp" alt="Birth of Shivaji" class="main-image">
</div>

<!-- FOOTER -->
<footer>
© 2026 महाराष्ट्राचे गड किल्ले | WPD Project
</footer>

</body>
</html>
